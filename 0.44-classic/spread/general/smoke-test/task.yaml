summary: Verify the Grafana Agent snap starts and stays active

environment:
  SNAP_NAME: grafana-agent
  MAX_RETRIES: "12"
  INTERVAL: "5"

prepare: |
  snap install "${CRAFT_ARTIFACT}" --dangerous

execute: |
  COUNT=0

  while [ "$COUNT" -lt "$MAX_RETRIES" ]; do
    state=$(snap services "${SNAP_NAME}" | tail -1 | awk '{print $3}')
    if [ "$state" != "active" ]; then
      echo "❌ ${SNAP_NAME} is not active (state=$state)"
      exit 1
    fi
    echo "[${COUNT}] ${SNAP_NAME} is active ..."
    COUNT=$((COUNT + 1))
    sleep "$INTERVAL"
  done

  echo "✅ ${SNAP_NAME} is active and running!"

restore: |
  snap remove "${SNAP_NAME}" --purge || true

debug: |
  snap logs "${SNAP_NAME}" -n 50 || true
  journalctl -xe --no-pager | tail -50 || true
